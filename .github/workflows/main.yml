name: CI

on:
  push:
    branches:
      - main
  pull_request:

# cancel in-progress runs on new commits to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

# OrganizeOS fork CI: only the checks relevant to this fork. The upstream
# webstudio-cloud jobs (deploy, visual regression, npm/R2 publish, fixtures
# size, docker e2e, private submodule) were removed with their workflows since
# they depend on webstudio's infrastructure and secrets.
jobs:
  checks:
    timeout-minutes: 20
    runs-on: ubuntu-24.04-arm

    env:
      DATABASE_URL: postgres://
      AUTH_SECRET: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Prettier
        run: pnpm prettier --check "**/*.{js,md,ts,tsx}"

      - name: Lint
        run: pnpm lint

      - name: No proprietary code (AGPL-only fork)
        run: pnpm check:no-proprietary

      - name: Test
        run: pnpm -r test

      - name: Typecheck
        run: pnpm -r typecheck
